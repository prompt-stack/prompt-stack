name: ✨ Feature Request
description: Suggest a new feature or enhancement for Prompt-Stack
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide details below to help us understand your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem would this feature solve? What's your use case?
      placeholder: |
        I'm building [type of application] and I need [specific functionality] because...
        Currently, I have to [current workaround] which is [why it's problematic]...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see
      placeholder: |
        I would like to see [specific feature] that would allow me to...
        This could work by [brief description of how it might work]...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Prompt-Stack would this affect?
      options:
        - Frontend (Next.js/React)
        - Backend (FastAPI/Python)
        - AI/LLM Integration
        - Authentication
        - Database/Storage
        - Payments
        - Documentation
        - Development Experience
        - Deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to your workflow?
      options:
        - Nice to have - would improve my experience
        - Important - significant impact on my productivity
        - Critical - blocking my use of the template
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered or tried?
      placeholder: |
        I've considered [alternative approaches] but they don't work because...
        Other tools that do this include [examples] but they lack [what Prompt-Stack offers]...

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Do you have any ideas on how this could be implemented?
      placeholder: |
        This might involve:
        - Adding [specific components/endpoints]
        - Integrating with [external services]
        - Modifying [existing functionality]
        
        I'm willing to help with implementation: [yes/no/maybe]

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: Any examples, mockups, or references that illustrate your idea?
      placeholder: |
        Similar to [existing tool/feature]
        Here's a rough mockup: [description or link]
        Reference implementation: [link]

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility Considerations
      description: Check any that apply to your feature request
      options:
        - label: Should work in both demo and production modes
        - label: Should be optional/configurable
        - label: Should maintain backward compatibility
        - label: Should work with all supported AI providers
        - label: Should be documented with examples

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this feature
        - label: I'm available for testing and feedback
        - label: I can help with documentation