name: AI Code Quality Audit

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install openai
        
    - name: Run AI Lint
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python scripts/ai-lint.py . --output ai-audit-report.json
        
    - name: Upload audit report
      uses: actions/upload-artifact@v3
      with:
        name: ai-audit-report
        path: ai-audit-report.json
        
    - name: Comment on PR (if PR trigger)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          // Read the audit report
          let report;
          try {
            const reportData = fs.readFileSync('ai-audit-report.json', 'utf8');
            report = JSON.parse(reportData);
          } catch (error) {
            console.log('Could not read audit report');
            return;
          }
          
          if (report.summary) {
            const score = report.summary.overall_score;
            const status = score >= 4.0 ? '✅' : score >= 3.0 ? '⚠️' : '❌';
            const statusText = score >= 4.0 ? 'EXCELLENT' : score >= 3.0 ? 'GOOD' : 'NEEDS IMPROVEMENT';
            
            let comment = `## ${status} AI Code Quality Audit
            
            **Overall Score:** ${score}/5.0 (${statusText})
            **Files Analyzed:** ${report.summary.files_analyzed}
            
            ### Dimension Scores
            `;
            
            for (const [dim, dimScore] of Object.entries(report.dimension_scores)) {
              const dimStatus = dimScore >= 4.0 ? '✅' : dimScore >= 3.0 ? '⚠️' : '❌';
              comment += `${dimStatus} **${dim.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase())}:** ${dimScore}/5.0\n`;
            }
            
            if (report.top_suggestions && report.top_suggestions.length > 0) {
              comment += `\n### 💡 Top Suggestions\n`;
              report.top_suggestions.slice(0, 5).forEach((suggestion, i) => {
                comment += `${i + 1}. ${suggestion}\n`;
              });
            }
            
            comment += `\n*This audit was generated by AI-Lint. See full report in job artifacts.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
          
    - name: Fail if score too low
      run: |
        python -c "
        import json
        with open('ai-audit-report.json') as f:
            report = json.load(f)
        if 'summary' in report and report['summary']['overall_score'] < 3.0:
            print(f'❌ AI audit failed: Score {report[\"summary\"][\"overall_score\"]} is below minimum 3.0')
            exit(1)
        print('✅ AI audit passed')
        "